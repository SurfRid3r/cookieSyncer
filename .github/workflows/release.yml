name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version matches manifest
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('cookie-sync-extension/manifest.json'))['version'])")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Package extension
        run: |
          cd cookie-sync-extension
          zip -r ../cookie-sync-v${{ steps.version.outputs.VERSION }}.zip . -x "*.DS_Store"
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: cookie-sync-v*.zip
